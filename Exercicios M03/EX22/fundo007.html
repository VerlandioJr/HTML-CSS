<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            background-image: url(imagens/target001.png);
            background-size: 100% 100%;

            position: relative;
            height: 96vh;
            padding: 10px;
            background-color: purple;
        }
        #conteudo{
            background-image: url(imagens/target001.png);
            background-size: 100% 100%;

            position: absolute;
            height: 200px;
            width: 400px;
            background-color: orange;

            left: 50%;
            top: 50%;

            transform: translate(-50%, -50%);
        }
        p{
            text-align: justify;
            padding: 5px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <section id="container">
        <article id="conteudo">
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Asperiores minima quasi labore enim veniam perspiciatis fugiat aspernatur atque delectus at eaque molestiae, ipsam inventore id a magnam saepe. Aliquam, placeat?</p>
        </article>
    </section>
</body>
</html>
