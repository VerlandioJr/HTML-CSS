<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face{
            font-family: 'Bohemia' ;
            src: url('Fontes/Bohemian\ Cassidy\ free.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;

            /* 
            Tipos de format()
            -opentype(otf)
            -truetype(ttf)
            -embedded-opentype
            -truetype-aat (Apple Advanced Typography)
            -svg
            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: 'Bohemia', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
<h1>Aula sobre fontes externas</h1>
<p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Earum ad aspernatur animi dolores expedita, mollitia vitae illum quisquam odio saepe praesentium, atque quas optio molestiae, deserunt eos nulla laboriosam repellendus?</p>
</body>
</html>
